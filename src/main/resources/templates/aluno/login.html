<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Muttley - Login Palestras</title>
    <style>
        body { font-family: sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #121212; color: white; }
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #4CAF50; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #bbb; }
        input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; background-color: #4CAF50; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .footer-links { margin-top: 20px; font-size: 0.85em; color: #888; }
        .footer-links a { color: #4CAF50; text-decoration: none; font-weight: bold; }
        .mensagem-sucesso { color: #4CAF50; background: rgba(76, 175, 80, 0.1); padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Muttley - Login</h2>
        
        <div class="mensagem-sucesso" th:if="${message}" th:text="${message}"></div>

		<form th:action="@{/aluno/login}" method="post">
		    <div th:if="${error}" style="color: #ff6b6b; margin-bottom: 10px;" th:text="${error}"></div>

		    <div class="input-group">
		        <label>E-mail institucional:</label>
		        <input type="email" name="email" placeholder="seu@email.com" required />
		    </div>
		    
		    <div class="input-group">
		        <label>Senha:</label>
		        <input type="password" name="senha" placeholder="********" required />
		    </div>

		    <button type="submit">Entrar</button>
		</form>

        <div class="footer-links">
            Ainda não tem conta? <br>
            <a th:href="@{/aluno/cadastro-aluno}">Cadastre-se aqui para as palestras</a>
        </div>
    </div>

</body>
</html>
