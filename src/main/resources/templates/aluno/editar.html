<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno - Palestras</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #121212; color: white; }
        form { max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #2b2b2b; color: white; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #ff6b6b; font-size: 0.8em; }
    </style>
</head>
<body>
    <h2>Editar Dados</h2>

    <form th:action="@{/aluno/salvar}" th:object="${aluno}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" />
            <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div>
            <label>Curso:</label>
            <input type="text" th:field="*{curso}" />
            <span class="error" th:if="${#fields.hasErrors('curso')}" th:errors="*{curso}"></span>
        </div>

        <div>
            <label>E-mail:</label>
            <input type="email" th:field="*{email}" />
            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div>
            <label>Senha:</label>
            <input type="password" th:field="*{senha}" placeholder="Digite sua senha" />
            <span class="error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></span>
        </div>

        <div>
            <label>Confirmar Senha:</label>
            <input type="password" th:field="*{confirmarSenha}" placeholder="Repita a senha" />
            <span class="error" th:if="${#fields.hasErrors('confirmarSenha')}" th:errors="*{confirmarSenha}"></span>
        </div>
		
		<div>
		    <label>Link do LinkedIn:</label>
		    <input type="text" th:field="*{linkedin}" placeholder="URL" />
		    <span class="error" th:if="${#fields.hasErrors('linkedin')}" th:errors="*{linkedin}"></span>
		</div>

		
        <button type="submit">Editar</button>
        <a th:href="@{/aluno}" style="color: #bbb; margin-left: 10px;">Cancelar</a>
    </form>
</body>
</html>
