<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Perfil da Instituição</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212; /* Dark mode que você gosta */
            color: white;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            background-color: #1e1e1e;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn-cadastro { background-color: #28a745; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Painel da Instituição</h1>
        <hr>
        
        <div th:if="${message}" style="color: #28a745; margin-bottom: 20px;">
            <p th:text="${message}"></p>
        </div>

        <p>Bem-vindo ao sistema Muttley!</p>
        
        <a th:href="@{/instituicao/cadastro-instituicao}" class="btn btn-cadastro">Nova Instituição</a>
        
		<div style="margin-top: 30px;">
		    <h3>Instituições Cadastradas:</h3>
		    <ul style="list-style: none; padding: 0;">
		        <li th:each="inst : ${listaInstituicoes}" style="margin-bottom: 10px; border-bottom: 1px solid #333; padding: 10px; background-color: #252525; border-radius: 5px;">
		            <strong th:text="${inst.nome}" style="color: #007bff;">Nome</strong> <br>
		            <small th:text="'CNPJ: ' + ${inst.cnpj}">CNPJ</small>
		            
		            <div style="margin-top: 10px;">
		                <a th:href="@{/instituicao/editar/{id}(id=${inst.id})}" 
		                   style="color: #ffc107; text-decoration: none; margin-right: 15px;">
		                   [ Editar ]
		                </a>

		                <a th:href="@{/instituicao/delete/{id}(id=${inst.id})}" 
		                   style="color: #dc3545; text-decoration: none;"
		                   onclick="return confirm('Tem certeza que deseja excluir esta instituição?')">
		                   [ Excluir ]
		                </a>
		            </div>
		        </li>
		    </ul>
		</div>

</body>
</html>
