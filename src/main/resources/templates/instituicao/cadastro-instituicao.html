<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Instituição - Muttley</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #121212; color: white; }
        form { max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #bbb; }
        input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        input:focus { border-color: #4CAF50; outline: none; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #45a049; }
        .error { color: #ff6b6b; font-size: 0.8em; margin-top: 5px; display: block; }
        .header-area { margin-bottom: 20px; }
        h2 { margin: 0; color: #4CAF50; }
        p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header-area">
        <h2>Cadastro de Instituição</h2>
        <p>Área de gestão de palestras e palestrantes</p>
    </div>

    <form th:action="@{/instituicao/salvar}" th:object="${instituicao}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label>Nome da Instituição:</label>
            <input type="text" th:field="*{nome}" placeholder="Ex: FATEC ZL" />
            <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div>
            <label>CNPJ:</label>
            <input type="text" th:field="*{cnpj}" placeholder="00.000.000/0000-00" />
            <span class="error" th:if="${#fields.hasErrors('cnpj')}" th:errors="*{cnpj}"></span>
        </div>

        <div>
            <label>E-mail Corporativo:</label>
            <input type="email" th:field="*{email}" placeholder="contato@instituicao.com" />
            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div>
            <label>Senha:</label>
            <input type="password" th:field="*{senha}" placeholder="Digite a senha" />
            <span class="error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></span>
        </div>

        <div>
            <label>Confirmar Senha:</label>
            <input type="password" th:field="*{confirmarSenha}" placeholder="Repita a senha" />
            <span class="error" th:if="${#fields.hasErrors('confirmarSenha')}" th:errors="*{confirmarSenha}"></span>
        </div>

        <button type="submit">Cadastrar Instituição</button>
        
        <div style="text-align: center; margin-top: 15px;">
            <a th:href="@{/instituicao/login}" style="color: #bbb; font-size: 0.9em; text-decoration: none;">Já tem cadastro? Entrar</a>
        </div>
    </form>
</body>
</html>
